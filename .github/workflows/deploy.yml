name: Deploy to Raspberry Pi

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Pull latest code
        run: git -C ~/planner pull origin main

      - name: Install dependencies
        run: cd ~/planner && npm install --prefer-offline

      - name: Build
        run: cd ~/planner && npm run build

      - name: Restart app
        run: /usr/bin/pm2 restart planner
